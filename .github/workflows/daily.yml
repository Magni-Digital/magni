name: Daily review queue

# MANUAL ONLY (no schedule) — on purpose. The real pipeline runs LOCALLY, where
# the enriched inputs (state/keepers_enriched.csv, the qualify cache) and tokens
# live; those are gitignored, so a CI run would only see the sample rows and
# would CLOBBER the good data.json with a samples-only version. So: refresh by
# running `python3 run.py` locally and pushing.
#
# To make this safe for CI later, commit the enriched inputs + cache to the repo
# (private) and re-enable the schedule below. The guard step aborts if those
# inputs aren't present, so a stray manual run can't overwrite real data.

on:
  workflow_dispatch: {}                 # manual "Run workflow" button
  schedule:
    - cron: "0 7 * * *"                 # ~2 AM Central; refreshes the queue daily

permissions:
  contents: write

concurrency:
  group: daily-queue
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard — refuse to run without the enriched inputs (would clobber real data)
        run: |
          if [ ! -f state/keepers_enriched.csv ]; then
            echo "::error::state/keepers_enriched.csv not in repo — CI can't reproduce the real pipeline. Refresh locally instead."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build today's queue
        env:
          # HUBSPOT_TOKEN lets CI pull new HubSpot companies + read sent/skip state.
          # Add it as a GitHub Actions secret (Settings → Secrets → Actions).
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          # Optional: nicer AI drafts / real deliverability. Unset → templates + MX.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_VERIFY_API_URL: ${{ secrets.EMAIL_VERIFY_API_URL }}
          EMAIL_VERIFY_API_KEY: ${{ secrets.EMAIL_VERIFY_API_KEY }}
        run: python3 run.py

      - name: Commit the refreshed queue
        run: |
          git config user.name "magni-bot"
          git config user.email "gc@glasscanopy.com"
          git add public/data.json public/daily-list.csv state/seen.json
          if git diff --staged --quiet; then
            echo "No changes today."
          else
            git commit -m "daily: refresh review queue ($(date -u +%F))"
            git pull --rebase --autostash || true
            git push
          fi
